name: Post-merge Fix & Version

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests (capture failures)
        shell: bash
        env:
          NO_COLOR: "1"
        run: |
          set -o pipefail
          mkdir -p test-artifacts

          set +e
          bun test --only-failures 2>&1 | tee test-artifacts/bun-test.log
          TEST_EXIT=${PIPESTATUS[0]}
          set -e

          bun test --reporter=junit --reporter-outfile test-artifacts/bun-junit.xml >/dev/null 2>&1 || true
          exit "$TEST_EXIT"

      - name: Summarize test output
        if: always()
        shell: bash
        run: |
          if [ -f test-artifacts/bun-test.log ]; then
            {
              echo "## Bun test output (failures only)"
              echo ""
              echo '```text'
              sed -n '1,240p' test-artifacts/bun-test.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bun-test-artifacts
          path: test-artifacts
          if-no-files-found: ignore

  fix-and-version:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run oxlint --fix
        run: bun run lint:fix

      - name: Run Prettier
        run: bun run format

      - name: Determine versioning
        id: versioning
        env:
          IS_FORK: ${{ github.event.repository.fork }}
        run: bun run post-merge:version

      - name: Stage changes
        id: stage
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        if: steps.stage.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/fix-and-version-${{ steps.versioning.outputs.new_version }}
          title: ${{ steps.versioning.outputs.pr_title }}
          body: ${{ steps.versioning.outputs.pr_body }}
          commit-message: ${{ steps.versioning.outputs.commit_message }}
          committer: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          delete-branch: true
