name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        shell: bash
        env:
          NO_COLOR: "1"
        run: |
          set -o pipefail
          mkdir -p test-artifacts

          set +e
          bun test --only-failures 2>&1 | tee test-artifacts/bun-test.log
          TEST_EXIT=${PIPESTATUS[0]}
          set -e

          bun test --reporter=junit --reporter-outfile test-artifacts/bun-junit.xml >/dev/null 2>&1 || true
          exit "$TEST_EXIT"

      - name: Summarize test output
        if: always()
        shell: bash
        run: |
          if [ -f test-artifacts/bun-test.log ]; then
            {
              echo "## Bun test output (failures only)"
              echo ""
              echo '```text'
              sed -n '1,240p' test-artifacts/bun-test.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bun-test-artifacts
          path: test-artifacts
          if-no-files-found: ignore

      - name: Build & package release
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: bun scripts/build.ts --release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          overwrite_files: true
          files: |
            dist/jenkins-cli-linux-x64
            dist/jenkins-cli-linux-x64-baseline
            dist/jenkins-cli-linux-x64-musl
            dist/jenkins-cli-linux-x64-musl-baseline
            dist/jenkins-cli-linux-arm64
            dist/jenkins-cli-linux-arm64-musl
            dist/jenkins-cli-darwin-x64
            dist/jenkins-cli-darwin-arm64
            dist/jenkins-cli-windows-x64.exe
            dist/jenkins-cli-windows-x64-baseline.exe
            dist/jenkins-cli-linux-x64.tar.gz
            dist/jenkins-cli-linux-x64-baseline.tar.gz
            dist/jenkins-cli-linux-arm64.tar.gz
            dist/jenkins-cli-darwin-x64.tar.gz
            dist/jenkins-cli-darwin-arm64.tar.gz
            dist/jenkins-cli
            dist/homebrew-jenkins-cli.rb
            dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync Homebrew tap
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        id: sync_tap
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
          GH_TOKEN: ${{ env.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail

          git clone --depth 1 \
            "https://x-access-token:${GH_TOKEN}@github.com/jatinbansal1998/homebrew-tap.git" \
            tap-repo

          mkdir -p tap-repo/Formula
          cp dist/homebrew-jenkins-cli.rb tap-repo/Formula/jenkins-cli.rb

          cd tap-repo
          git add Formula/jenkins-cli.rb
          if git diff --cached --quiet -- Formula/jenkins-cli.rb; then
            echo "No formula changes; skipping."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "jenkins-cli ${TAG_NAME}"
          git push origin HEAD:main

      - name: Summarize tap sync
        if: always()
        shell: bash
        env:
          TAP_SYNC_OUTCOME: ${{ steps.sync_tap.outcome }}
        run: |
          {
            echo "## Homebrew tap sync"
            echo ""
            if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
              echo "Skipped: \`HOMEBREW_TAP_TOKEN\` is not set."
            elif [ "$TAP_SYNC_OUTCOME" = "success" ]; then
              echo "Success: \`Formula/jenkins-cli.rb\` synced to \`jatinbansal1998/homebrew-tap\`."
            elif [ "$TAP_SYNC_OUTCOME" = "skipped" ]; then
              echo "Skipped by workflow condition."
            else
              echo "Failed: tap sync step outcome was \`$TAP_SYNC_OUTCOME\`."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
