name: Pull Request Tests

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - ".github/workflows/**"
      - "**/*.md"
      - "docs/**"
      - "fuzzy-search-docs/**"
      - "LICENSE"
      - ".github/FUNDING.yml"
      - ".coderabbit.yaml"
      - ".devcontainer/**"
      - ".gitignore"

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install secure-store tooling (libsecret + keyring)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-tools gnome-keyring dbus dbus-x11

      - name: Configure unlocked test keychain
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          TEST_KEYCHAIN="$RUNNER_TEMP/jenkins-cli-ci.keychain-db"
          security create-keychain -p "jenkins-cli-ci" "$TEST_KEYCHAIN"
          security set-keychain-settings -lut 21600 "$TEST_KEYCHAIN"
          security unlock-keychain -p "jenkins-cli-ci" "$TEST_KEYCHAIN"
          security list-keychains -d user -s "$TEST_KEYCHAIN"
          security default-keychain -d user -s "$TEST_KEYCHAIN"
          # Each isolated test HOME configures this as its default keychain.
          echo "JENKINS_CLI_TEST_KEYCHAIN=$TEST_KEYCHAIN" >> "$GITHUB_ENV"

      - name: Build and install CLI
        shell: bash
        run: |
          set -euo pipefail
          bun run build
          mkdir -p "$RUNNER_TEMP/jenkins-cli-bin"
          cp dist/jenkins-cli "$RUNNER_TEMP/jenkins-cli-bin/jenkins-cli"
          chmod +x "$RUNNER_TEMP/jenkins-cli-bin/jenkins-cli"
          echo "$RUNNER_TEMP/jenkins-cli-bin" >> "$GITHUB_PATH"

      - name: Validate installed CLI version
        shell: bash
        run: |
          set -euo pipefail
          EXPECTED_VERSION="$(bun -e 'console.log((await Bun.file("package.json").json()).version)')"
          INSTALLED_VERSION="$(jenkins-cli --version)"
          echo "$INSTALLED_VERSION"
          grep -F "$EXPECTED_VERSION" <<< "$INSTALLED_VERSION"
          case "$RUNNER_OS" in
            Linux) EXPECTED_TARGET="bun-linux-" ;;
            macOS) EXPECTED_TARGET="bun-darwin-" ;;
            *) echo "Unsupported runner OS: $RUNNER_OS" >&2; exit 1 ;;
          esac
          grep -F "$EXPECTED_TARGET" <<< "$INSTALLED_VERSION"

      - name: Run tests (capture failures)
        if: runner.os == 'Linux'
        shell: bash
        env:
          NO_COLOR: "1"
        run: |
          set -o pipefail
          mkdir -p test-artifacts

          # Run inside a D-Bus session with an unlocked gnome-keyring so the
          # secure-store integration tests (secret-tool) actually execute on
          # Linux instead of being skipped.
          dbus-run-session -- bash -c '
            set -o pipefail
            echo -n "" | gnome-keyring-daemon --unlock >/dev/null 2>&1 || true

            set +e
            bun test --only-failures 2>&1 | tee test-artifacts/bun-test.log
            TEST_EXIT=${PIPESTATUS[0]}
            set -e

            bun test --reporter=junit --reporter-outfile test-artifacts/bun-junit.xml >/dev/null 2>&1 || true
            exit "$TEST_EXIT"
          '

      - name: Run tests with macOS Keychain (capture failures)
        if: runner.os == 'macOS'
        shell: bash
        env:
          NO_COLOR: "1"
          REQUIRE_KEYCHAIN_INTEGRATION: "1"
        run: |
          set -o pipefail
          mkdir -p test-artifacts

          set +e
          bun test --only-failures 2>&1 | tee test-artifacts/bun-test.log
          TEST_EXIT=${PIPESTATUS[0]}
          set -e

          bun test --reporter=junit --reporter-outfile test-artifacts/bun-junit.xml >/dev/null 2>&1 || true
          exit "$TEST_EXIT"

      - name: Summarize test output
        if: always()
        shell: bash
        run: |
          if [ -f test-artifacts/bun-test.log ]; then
            {
              echo "## Bun test output (failures only)"
              echo ""
              echo '```text'
              sed -n '1,240p' test-artifacts/bun-test.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bun-test-artifacts-${{ matrix.os }}
          path: test-artifacts
          if-no-files-found: ignore

  jenkins-integration:
    name: Jenkins integration (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            test-script: test:mutation:jenkins
          - os: macos-latest
            test-script: test:integration:jenkins
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Java for native Jenkins
        if: runner.os == 'macOS'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Install dependencies
        run: bun install

      - name: Cache native Jenkins tools
        if: runner.os == 'macOS'
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/jenkins-cli-integration-tools
          key: jenkins-native-${{ runner.os }}-2.568.1-2.15.0-${{ hashFiles('tests/integration/jenkins/plugins.txt') }}

      - name: Install Linux keyring tooling
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-tools gnome-keyring dbus dbus-x11 util-linux

      - name: Configure unlocked macOS test keychain
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          TEST_KEYCHAIN="$RUNNER_TEMP/jenkins-cli-integration.keychain-db"
          security create-keychain -p "jenkins-cli-ci" "$TEST_KEYCHAIN"
          security set-keychain-settings -lut 21600 "$TEST_KEYCHAIN"
          security unlock-keychain -p "jenkins-cli-ci" "$TEST_KEYCHAIN"
          security list-keychains -d user -s "$TEST_KEYCHAIN"
          security default-keychain -d user -s "$TEST_KEYCHAIN"
          echo "JENKINS_CLI_TEST_KEYCHAIN=$TEST_KEYCHAIN" >> "$GITHUB_ENV"

      - name: Run Jenkins integration tests with Linux Secret Service
        if: runner.os == 'Linux'
        shell: bash
        env:
          REQUIRE_KEYCHAIN_INTEGRATION: "1"
        run: |
          dbus-run-session -- bash -c '
            set -euo pipefail

            # Create and unlock a real login collection before D-Bus activates
            # the Secret Service component.
            eval "$(printf %s "jenkins-cli-ci" | gnome-keyring-daemon --unlock --components=secrets)"
            export GNOME_KEYRING_CONTROL

            # Fail before Jenkins startup if Secret Service cannot round-trip
            # a credential in this exact session.
            printf %s "keyring-probe" |
              secret-tool store --label="jenkins-cli integration probe" \
                service jenkins-cli-ci account integration-probe
            test "$(secret-tool lookup service jenkins-cli-ci account integration-probe)" = "keyring-probe"
            secret-tool clear service jenkins-cli-ci account integration-probe

            bun run "${{ matrix.test-script }}"
          '

      - name: Run Jenkins integration tests with macOS Keychain
        if: runner.os == 'macOS'
        shell: bash
        env:
          REQUIRE_KEYCHAIN_INTEGRATION: "1"
          JENKINS_INTEGRATION_TOOL_CACHE: ${{ runner.temp }}/jenkins-cli-integration-tools
        run: bun run "${{ matrix.test-script }}"
